<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0c1427;
      color: #ffffff;
    }

    .frame {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 56px 72px;
      background:
        radial-gradient(circle at 18% 22%, rgba(201, 168, 76, 0.16) 0%, transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(26, 43, 74, 0.9) 0%, transparent 42%),
        linear-gradient(135deg, #0c1427 0%, #152040 48%, #0f1a33 100%);
      border: 1px solid rgba(201, 168, 76, 0.28);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(201, 168, 76, 0.14);
      border-radius: 24px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 48px;
      align-items: center;
      height: 100%;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.22);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .logo-wrap img {
      width: 168px;
      height: 168px;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.35));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.28);
      color: #e8c97a;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .title {
      font-size: 58px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
      max-width: 760px;
    }

    .title span {
      color: #c9a84c;
    }

    .subtitle {
      font-size: 26px;
      line-height: 1.45;
      color: #cbd5e1;
      max-width: 720px;
      margin-bottom: 34px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .feature {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(201, 168, 76, 0.18);
      color: #94a3b8;
      font-size: 16px;
      font-weight: 600;
    }

    .footer {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .footer strong {
      color: #c9a84c;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="content">
      <div class="logo-wrap">
        <img src="../public/APA Teamsters Local 2118 Logo.png" alt="" />
      </div>
      <div>
        <div class="eyebrow">APA Local 2118 · Allegiant Air Pilots</div>
        <h1 class="title">Contract <span>Comparison</span> Calculator</h1>
        <div class="features">
          <div class="feature">~3 minutes to complete</div>
          <div class="feature">Personalized to your career</div>
          <div class="feature">Private — data stays on device</div>
        </div>
      </div>
    </div>
    <div class="footer">
      <span>2026 Tentative Agreement Decision Tool</span>
    </div>
  </div>
</body>
</html>
