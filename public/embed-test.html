<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APA2118 Tool — Embed Test</title>
  <style>
    body { margin: 0; padding: 20px; background: #f5f5f5; font-family: sans-serif; }
    h1 { font-size: 16px; color: #333; margin-bottom: 12px; }
    iframe { width: 100%; border: 2px solid #ddd; border-radius: 8px; background: white; }
  </style>
</head>
<body>
  <h1>APA2118 Tool Embed Test — iframe auto-resize demo</h1>
  <iframe id="apa-tool" src="/" height="600" frameborder="0"></iframe>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'apa2118-resize') {
        document.getElementById('apa-tool').style.height = e.data.height + 'px'
      }
    })
  </script>
</body>
</html>
