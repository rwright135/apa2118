<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer gold border -->
  <circle cx="100" cy="100" r="99" fill="#c9a84c"/>

  <!-- Gold gear-teeth ring: small notches around perimeter -->
  <circle cx="100" cy="100" r="95" fill="#1a2b4a"/>
  <circle cx="100" cy="100" r="99" fill="none" stroke="#e8c97a" stroke-width="1"/>

  <!-- Gear-tooth effect via dashed stroke -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#1a2b4a" stroke-width="5" stroke-dasharray="4 4.2"/>

  <!-- Main navy disc -->
  <circle cx="100" cy="100" r="90" fill="#1a2b4a"/>

  <!-- Gold inner rings -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#c9a84c" stroke-width="0.75"/>

  <!-- ── TEAMSTERS arc text ── -->
  <path id="top-arc" d="M 28,96 A 72,72 0 0,1 172,96" fill="none"/>
  <text font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="13.5" fill="white" letter-spacing="2.5">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">TEAMSTERS</textPath>
  </text>

  <!-- Gold horizontal rule lines -->
  <line x1="30" y1="74" x2="170" y2="74" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="30" y1="134" x2="170" y2="134" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- ── Left horse head (facing right) ── -->
  <g fill="white" opacity="0.95">
    <!-- Head shape -->
    <path d="M 44,68 C 44,68 38,60 36,52 C 34,44 38,38 44,37 C 50,36 55,40 55,46 C 55,50 53,53 56,56 C 59,59 64,58 66,63 C 68,68 65,74 60,75 C 55,76 48,73 44,68 Z"/>
    <!-- Ear -->
    <path d="M 44,37 C 44,37 40,30 43,28 C 46,26 50,31 49,37 Z"/>
    <!-- Eye -->
    <circle cx="58" cy="47" r="2" fill="#1a2b4a"/>
    <!-- Nostril -->
    <ellipse cx="52" cy="68" rx="2" ry="1.5" fill="#1a2b4a" opacity="0.5"/>
    <!-- Mane strands -->
    <path d="M 55,46 C 62,42 65,38 62,35" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 55,50 C 63,48 67,44 64,40" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- ── Right horse head (facing left, mirrored) ── -->
  <g fill="white" opacity="0.95" transform="translate(200,0) scale(-1,1)">
    <path d="M 44,68 C 44,68 38,60 36,52 C 34,44 38,38 44,37 C 50,36 55,40 55,46 C 55,50 53,53 56,56 C 59,59 64,58 66,63 C 68,68 65,74 60,75 C 55,76 48,73 44,68 Z"/>
    <path d="M 44,37 C 44,37 40,30 43,28 C 46,26 50,31 49,37 Z"/>
    <circle cx="58" cy="47" r="2" fill="#1a2b4a"/>
    <ellipse cx="52" cy="68" rx="2" ry="1.5" fill="#1a2b4a" opacity="0.5"/>
    <path d="M 55,46 C 62,42 65,38 62,35" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 55,50 C 63,48 67,44 64,40" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- ── Airplane (center, white) ── -->
  <g transform="translate(100,104)" fill="white">
    <!-- Fuselage body -->
    <rect x="-30" y="-5" width="60" height="10" rx="5" fill="white"/>
    <!-- Nose -->
    <path d="M 30,-3 C 38,-3 42,0 38,3 L 30,3 Z" fill="white"/>
    <!-- Tail fin -->
    <path d="M -30,-5 C -36,-5 -38,-8 -34,-8 L -26,-5 Z" fill="white"/>
    <path d="M -30,5 C -36,5 -38,8 -34,8 L -26,5 Z" fill="white"/>
    <!-- Main wings (swept) -->
    <path d="M -5,-5 C 6,-20 20,-24 22,-5 Z" fill="white"/>
    <path d="M -5,5 C 6,20 20,24 22,5 Z" fill="white"/>
    <!-- Horizontal stabilizers -->
    <path d="M -24,-5 C -20,-13 -15,-14 -15,-5 Z" fill="white"/>
    <path d="M -24,5 C -20,13 -15,14 -15,5 Z" fill="white"/>
  </g>

  <!-- ── LOCAL text ── -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-weight="700" font-size="10.5" fill="white" text-anchor="middle" letter-spacing="4.5">LOCAL</text>

  <!-- Gold decorative dots flanking 2118 -->
  <circle cx="67" cy="160" r="2.5" fill="#c9a84c"/>
  <circle cx="133" cy="160" r="2.5" fill="#c9a84c"/>

  <!-- ── 2118 ── -->
  <text x="100" y="172" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle" letter-spacing="2">2118</text>
</svg>
